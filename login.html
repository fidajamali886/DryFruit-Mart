<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | DryFruit Mart</title>
  <link rel="stylesheet" href="css/style.css" />
 <link rel="icon" href="images/favicon.png">

</head>
<body>
  <a class="back-link" href="index.html" aria-label="Back to home">← Back</a>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-panel auth-form-panel">
        <div class="auth-logo">DryFruit Mart</div>
        <h1>Sign In</h1>
        <p class="auth-description">Sign in to your account to continue shopping and view your orders.</p>
        <form>
          <label for="email">Email Address</label>
          <input id="email" class="auth-input" type="email" placeholder="you@example.com" required />
          <label for="password">Password</label>
          <input id="password" class="auth-input" type="password" placeholder="Your password" required />
          <button class="button primary auth-submit" type="submit">Login</button>
        </form>
        <p class="auth-footnote">
          Don't have an account? <a href="register.html">Register here</a>
        </p>
      </div>
      <div class="auth-panel auth-welcome-panel">
        <div class="welcome-badge">Welcome</div>
        <h2>Welcome Back</h2>
        <p style="color: white;">Enter your credentials to access your account and manage orders.</p>
      </div>
    </div>
  </div>
</body>
</html>
